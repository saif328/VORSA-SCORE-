<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vorsa Score - الصيانه</title>
    <style>
        :root { --vorsa-red: #ed1c24; --bg-dark: #0a0a0a; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-dark); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
        }

        /* شاشة الصيانة التي ستغطي كل شيء */
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 99999;
            text-align: center; padding: 20px;
        }

        .vorsa-icon { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 4px solid var(--vorsa-red);
            object-fit: cover; box-shadow: 0 0 30px rgba(237, 28, 36, 0.6);
            margin-bottom: 30px;
        }

        h1 { color: var(--vorsa-red); font-size: 28px; margin-bottom: 10px; font-weight: 900; }
        p { color: white; font-size: 18px; line-height: 1.6; max-width: 80%; }
        
        .loading-dots:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            40% { color: var(--vorsa-red); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .5em 0 0 var(--vorsa-red), 1em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .5em 0 0 var(--vorsa-red), 1em 0 0 var(--vorsa-red); }
        }
    </style>
</head>
<body>

    <div id="maintenance-screen">
        <img src="https://i.ibb.co/cS9Y8wYN/image.jpg" alt="Vorsa Logo" class="vorsa-icon">
        
        <h1>التطبيق في الصيانة</h1>
        <p>نحن نقوم بتحديث <b>Vorsa Score</b> لتوفير تجربة أفضل لك.</p>
        <p style="color: #888; font-size: 14px;">يرجى الانتظار، سنعود قريباً<span class="loading-dots"></span></p>
        
        <div style="margin-top: 40px; color: #444; font-size: 12px; border-top: 1px solid #222; padding-top: 10px; width: 60%;">
            التطوير بواسطة سيف علاء - شركة Vorsa
        </div>
    </div>

</body>
</html>
